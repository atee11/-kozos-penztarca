<script>

  trash:`<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6B7B78" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
  sync:`<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9AA8A5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>`,
};

// Metadata
const GM={
  'Bevétel':{color:'#4DD0B1',icon:'💰'},
  'Rezsi':{color:'#FF8A65',icon:'🏠'},
  'Kaja':{color:'#FFB74D',icon:'🛒'},
  'Hitelek':{color:'#F06292',icon:'🏦'},
  'Megtakarítás':{color:'#81C784',icon:'💎'},
};
const PAL=['#FF8A65','#FFB74D','#F06292','#81C784','#4FC3F7','#BA68C8','#4DD0B1','#A1887F','#90A4AE','#FF7043'];
function meta(name){
  if(GM[name])return GM[name];
  let h=0;for(let i=0;i<name.length;i++)h=name.charCodeAt(i)+((h<<5)-h);
  return{color:PAL[Math.abs(h)%PAL.length],icon:'📁'};
}
const fmt=n=>new Intl.NumberFormat('hu-HU',{maximumFractionDigits:0}).format(n)+' Ft';
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const today=()=>new Date().toISOString().slice(0,10);

function fbd(y,m){let c=0,d=1;while(c<5){const w=new Date(y,m,d).getDay();if(w!==0&&w!==6)c++;if(c<5)d++;}return d;}
function salaryMonths(since){
  if(!since)return 0;
  const s=new Date(since),now=new Date();
  let c=0,y=s.getFullYear(),m=s.getMonth();
  while(y<now.getFullYear()||(y===now.getFullYear()&&m<=now.getMonth())){
    const d=new Date(y,m,fbd(y,m));
    if(d>=s&&d<=now)c++;
    m++;if(m>11){m=0;y++;}
  }
  return c;
}

// Dinamikus szín interpoláció (zöld → sárga → narancs → piros)
function barColor(pct){
  const p=Math.min(1,pct/100);
  const stops=[[0,[77,208,177]],[0.55,[255,214,0]],[0.8,[255,138,101]],[1,[255,60,60]]];
  let f=stops[0],t=stops[1];
  for(let i=0;i<stops.length-1;i++){if(p>=stops[i][0]&&p<=stops[i+1][0]){f=stops[i];t=stops[i+1];break;}}
  const r=t[0]>f[0]?(p-f[0])/(t[0]-f[0]):1;
  const lerp=(a,b)=>Math.round(a+(b-a)*r);
  return`rgb(${lerp(f[1][0],t[1][0])},${lerp(f[1][1],t[1][1])},${lerp(f[1][2],t[1][2])})`;
}

const PERSON_COLOR={'Attila':'#4FC3F7','Szandra':'#F48FB1'};

const DEF=[
  {id:'d0',type:'income',label:'Szandra',amount:650000,group:'Bevétel'},
  {id:'d1',type:'income',label:'Ati',amount:650000,group:'Bevétel'},
  {id:'d2',type:'expense',label:'Kajo étkezés',amount:17000,group:'Rezsi'},
  {id:'d3',type:'expense',label:'Vodafone',amount:70000,group:'Rezsi'},
  {id:'d4',type:'expense',label:'Digi',amount:8110,group:'Rezsi'},
  {id:'d5',type:'expense',label:'MVM',amount:6000,group:'Rezsi'},
  {id:'d6',type:'expense',label:'Online előfizetések',amount:8000,group:'Rezsi'},
  {id:'d7',type:'expense',label:'Díjbeszedő',amount:10000,group:'Rezsi'},
  {id:'d8',type:'expense',label:'Főtáv',amount:13000,group:'Rezsi'},
  {id:'d9',type:'expense',label:'Közös ktg',amount:12330,group:'Rezsi'},
  {id:'d10',type:'expense',label:'Tankolás',amount:60000,group:'Rezsi'},
  {id:'d11',type:'expense',label:'Fanni edzés',amount:50000,group:'Rezsi'},
  {id:'d12',type:'expense',label:'Beni',amount:50000,group:'Rezsi'},
  {id:'d13',type:'expense',label:'Lakásbiztosítás',amount:3000,group:'Rezsi'},
  {id:'d14',type:'expense',label:'Autó lízing',amount:156035,group:'Rezsi'},
  {id:'d15',type:'expense',label:'Havi élelmiszer',amount:200000,group:'Kaja'},
  {id:'d16',type:'expense',label:'Lakáshitel',amount:82500,group:'Hitelek'},
  {id:'d17',type:'expense',label:'KH hitel',amount:0,group:'Hitelek'},
  {id:'d18',type:'expense',label:'Cetelem',amount:0,group:'Hitelek'},
  {id:'d19',type:'expense',label:'Raiffeisen',amount:47150,group:'Hitelek'},
  {id:'d20',type:'expense',label:'OTP hitel 1',amount:82000,group:'Hitelek'},
  {id:'d21',type:'expense',label:'OTP hitel 2',amount:29000,group:'Hitelek'},
  {id:'d22',type:'expense',label:'OTP hitel 3',amount:11635,group:'Hitelek'},
  {id:'d23',type:'expense',label:'Havi megtakarítás',amount:300000,group:'Megtakarítás'},
];

// Storage
const K='kp__';
const lg=k=>{try{const v=localStorage.getItem(K+k);return v?JSON.parse(v):null;}catch(_){return null;}};
const ls=(k,v)=>{try{localStorage.setItem(K+k,JSON.stringify(v));}catch(_){}};

// State
let S={
  entered:false,
  items:[],groupOrder:null,customGroups:[],savingsEntries:[],savingsStart:null,
  actualPayments:[],dismissedSavingsPeriods:[],actualPerson:'Attila',
  modal:null,editingId:null,formType:'expense',formGroup:'Rezsi',
  draggingGroup:null,draggingItem:null,
};

function loadData(){
  const items=lg('items');
  S.items=items&&items.length>0?items:DEF;
  if(!items||!items.length)ls('items',S.items);
  S.groupOrder=lg('groupOrder');
  S.customGroups=lg('customGroups')||[];
  S.savingsEntries=lg('savingsEntries')||[];
  S.savingsStart=lg('savingsStart')||(new Date().toISOString().slice(0,7)+'-01');
  if(!lg('savingsStart'))ls('savingsStart',S.savingsStart);
  S.actualPayments=lg('actual')||[];
  S.dismissedSavingsPeriods=lg('dismissedSav')||[];
}

// Computed
function getTI(){return S.items.filter(i=>i.type==='income').reduce((s,i)=>s+i.amount,0);}
function getGE(){
  const map={};
  S.items.filter(i=>i.type==='expense').forEach(i=>{if(!map[i.group])map[i.group]=[];map[i.group].push(i);});
  const g=Object.entries(map).map(([name,list])=>({name,...meta(name),items:list,total:list.reduce((s,i)=>s+i.amount,0)}));
  if(S.groupOrder)g.sort((a,b)=>{const ai=S.groupOrder.indexOf(a.name),bi=S.groupOrder.indexOf(b.name);if(ai===-1&&bi===-1)return 0;if(ai===-1)return 1;if(bi===-1)return -1;return ai-bi;});
  return g;
}
function getAT(){return getGE().reduce((s,g)=>s+g.total,0);}
function getZPP(){return Math.max(0,(getTI()-getAT())/2);}
function getMFS(){return S.items.filter(i=>i.type==='expense'&&i.group==='Megtakarítás').reduce((s,i)=>s+i.amount,0);}
function getST(){return salaryMonths(S.savingsStart)*getMFS()+S.savingsEntries.reduce((s,e)=>s+e.amount,0);}
function getSugg(){const s=new Set(Object.keys(GM));S.customGroups.forEach(g=>s.add(g));S.items.forEach(i=>s.add(i.group));s.delete('Bevétel');return[...s];}

// Tényleges kiadás időszak: az aktuális hónap 5. munkanapjától indul
function getPeriodStart(){
  const now=new Date();
  const fbdNow=new Date(now.getFullYear(),now.getMonth(),fbd(now.getFullYear(),now.getMonth()));
  if(now>=fbdNow) return fbdNow;
  const pm=now.getMonth()===0?11:now.getMonth()-1;
  const py=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
  return new Date(py,pm,fbd(py,pm));
}
function getActualSpent(){
  const ps=getPeriodStart(), psKey=ps.toISOString().slice(0,10);
  const manual=S.actualPayments.filter(p=>new Date(p.date)>=ps).reduce((s,p)=>s+p.amount,0);
  const dismissed=S.dismissedSavingsPeriods.includes(psKey);
  return manual+(dismissed?0:getMFS());
}
function getBudget(){return getAT();}
function getPeriodPayments(){
  const ps=getPeriodStart(), psKey=ps.toISOString().slice(0,10);
  const manual=S.actualPayments.filter(p=>new Date(p.date)>=ps).sort((a,b)=>b.date.localeCompare(a.date));
  const dismissed=S.dismissedSavingsPeriods.includes(psKey);
  if(!dismissed&&getMFS()>0) manual.unshift({id:'__sav__',amount:getMFS(),label:'💎 Megtakarítás',date:psKey,auto:true});
  return manual;
}

function renderActual(){
  const spent=getActualSpent(), budget=getBudget(), rem=Math.max(0,budget-spent);
  const over=spent>budget;
  const pct=budget>0?Math.min(100,spent/budget*100):0;
  const bc=barColor(pct);
  const spentColor=over?'#FF5252':'#F4F1EA';
  const ps=getPeriodStart();
  const psStr=ps.toLocaleDateString('hu-HU',{month:'long',day:'numeric'});
  const payments=getPeriodPayments();

            ${fmt(budget)} keretből

              ?` · <span style="color:#FF5252;font-weight:700">+${fmt(spent-budget)} túlköltés</span>`
              :` · <span style="color:#9AA8A5">marad ${fmt(rem)}</span>`}

          <div style="height:16px;background:#1A2925;border-radius:10px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.3)">

          const pps=getPeriodPayments();

          const szandra=pps.filter(p=>p.person==='Szandra').reduce((s,p)=>s+p.amount,0);

function bind(){
  document.querySelectorAll('.grip').forEach(el=>{
    el.addEventListener('touchstart',e=>{
      e.stopPropagation();
      const gc=el.dataset.gc,gi=el.dataset.gi,gg=el.dataset.gg;
      if(gc){DS={type:'gc',name:gc};S.draggingGroup=gc;}
      else if(gi){DS={type:'item',id:gi,group:gg};S.draggingItem=gi;}
      render();
    },{passive:true});
  });
}

// Drag
let DS=null;
document.addEventListener('touchmove',e=>{
  if(!DS)return;
  e.preventDefault();
  const t=e.touches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  if(!el)return;
  if(DS.type==='gc'){
    const card=el.closest('[data-group-name]');if(!card)return;
    const tn=card.dataset.groupName,cn=DS.name;if(tn===cn)return;
    const names=getGE().map(g=>g.name);
    const ci=names.indexOf(cn),ti=names.indexOf(tn);if(ci===-1||ti===-1)return;
    const next=[...names];next.splice(ci,1);next.splice(ti,0,cn);
    S.groupOrder=next;ls('groupOrder',next);render();
  }
  if(DS.type==='item'){
    const row=el.closest('[data-item-id]');if(!row)return;
    const tid=row.dataset.itemId,sid=DS.id,gn=DS.group;if(tid===sid)return;
    const gi=S.items.filter(i=>i.group===gn);
    const si=gi.findIndex(i=>i.id===sid),ti=gi.findIndex(i=>i.id===tid);
    if(si===-1||ti===-1)return;
    const ng=[...gi];ng.splice(si,1);ng.splice(ti,0,gi[si]);
    let x=0;S.items=S.items.map(i=>i.group===gn?ng[x++]:i);render();
  }
},{passive:false});
document.addEventListener('touchend',()=>{
  if(!DS)return;
  if(DS.type==='item')ls('items',S.items);
  DS=null;S.draggingGroup=null;S.draggingItem=null;render();
});

// App controller
window.A={
  enter(){S.entered=true;loadData();render();},
  close(){S.modal=null;S.editingId=null;render();},
  newItem(type,group){S.modal='form';S.editingId=null;S.formType=type;S.formGroup=group||(type==='income'?'Bevétel':'Rezsi');render();setTimeout(()=>document.getElementById('fl')?.focus(),100);},
  edit(id){const it=S.items.find(i=>i.id===id);if(!it)return;S.modal='form';S.editingId=id;S.formType=it.type;S.formGroup=it.group;render();},
  setT(t){S.formType=t;S.formGroup=t==='income'?'Bevétel':'Rezsi';render();},
  setG(g){S.formGroup=g;render();},
  setC(g,c){GM[g]={...(GM[g]||{}),color:c,icon:GM[g]?.icon||'📁'};render();},
  submit(){
    const lbl=document.getElementById('fl')?.value.trim();
    const amt=parseFloat(document.getElementById('fa')?.value);
    const grp=(document.getElementById('fg')?.value.trim()||S.formGroup).trim()||'Egyéb';
    if(!lbl||!amt||amt<=0)return;
    if(!GM[grp]&&!S.customGroups.includes(grp)){S.customGroups.push(grp);ls('customGroups',S.customGroups);}
    if(S.editingId){S.items=S.items.map(i=>i.id===S.editingId?{...i,type:S.formType,label:lbl,amount:amt,group:grp}:i);}
    else{S.items.unshift({id:Date.now().toString(),type:S.formType,label:lbl,amount:amt,group:grp});}
    ls('items',S.items);S.modal=null;S.editingId=null;render();
  },
  del(id){S.items=S.items.filter(i=>i.id!==id);ls('items',S.items);render();},
  openSav(){S.modal='sav';render();setTimeout(()=>document.getElementById('sa')?.focus(),100);},
  submitSav(){
    const amt=parseFloat(document.getElementById('sa')?.value);
    const lbl=document.getElementById('sl')?.value.trim()||'Egyedi befizetés';
    const dt=document.getElementById('sd')?.value||today();
    if(!amt||amt<=0)return;
    S.savingsEntries.unshift({id:Date.now().toString(),amount:amt,label:lbl,date:dt});
    ls('savingsEntries',S.savingsEntries);S.modal=null;render();
  },
  delSav(id){S.savingsEntries=S.savingsEntries.filter(e=>e.id!==id);ls('savingsEntries',S.savingsEntries);render();},
  openSync(){S.modal='sync';render();},
  setPerson(p){S.actualPerson=p;render();},
  newActual(){S.modal='actual';render();setTimeout(()=>document.getElementById('aa')?.focus(),100);},
  submitActual(){
    const amt=parseFloat(document.getElementById('aa')?.value);
    const lbl=document.getElementById('al')?.value.trim()||'Kiadás';
    const dt=document.getElementById('ad')?.value||today();
    const person=S.actualPerson||'Attila';
    if(!amt||amt<=0)return;
    S.actualPayments.unshift({id:Date.now().toString(),amount:amt,label:lbl,date:dt,person});
    ls('actual',S.actualPayments);S.modal=null;render();
  },
  delActual(id){
    if(id==='__sav__'){
      const psKey=getPeriodStart().toISOString().slice(0,10);
      if(!S.dismissedSavingsPeriods.includes(psKey)){S.dismissedSavingsPeriods.push(psKey);ls('dismissedSav',S.dismissedSavingsPeriods);}
    } else {
      S.actualPayments=S.actualPayments.filter(p=>p.id!==id);ls('actual',S.actualPayments);
    }
    render();
  },
  exp(){
    const d={};['items','groupOrder','customGroups','savingsEntries','savingsStart'].forEach(k=>{const v=localStorage.getItem(K+k);if(v)d[k]=v;});
    const j=JSON.stringify(d);
    if(navigator.clipboard){navigator.clipboard.writeText(j).then(()=>{const m=document.getElementById('sm');if(m)m.textContent='✅ Vágólapra másolva! Küldd el és importáld a másik telefonon.';});}
    else{const t=document.getElementById('st');if(t)t.value=j;}
  },
  imp(){
    const t=document.getElementById('st')?.value.trim();
    const m=document.getElementById('sm');
    if(!t){if(m)m.textContent='❌ Üres mező.';return;}
    try{const d=JSON.parse(t);Object.entries(d).forEach(([k,v])=>localStorage.setItem(K+k,v));if(m)m.textContent='✅ Sikeres! Újratöltés...';setTimeout(()=>{S.modal=null;loadData();render();},1000);}
    catch(_){if(m)m.textContent='❌ Érvénytelen adat.';}
  },
};

render();
</script>
</body>
</html>
